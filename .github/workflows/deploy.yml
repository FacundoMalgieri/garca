name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual/programmatic trigger

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Capture currently-served build version
        id: prev_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          prev=$(curl -sf "https://garca.app/api/health?cb=$(date +%s)" | jq -r '.version // "none"' 2>/dev/null || echo "none")
          echo "Currently serving version: $prev"
          echo "version=$prev" >> "$GITHUB_OUTPUT"

      - name: Deploy to Dokploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://panel.garca.app/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId": "${{ secrets.DOKPLOY_APP_ID }}"}')
          if [ "$response" != "200" ]; then
            echo "Deploy failed with status $response"
            exit 1
          fi
          echo "Deploy triggered successfully"

      # Espera activa: pollea /api/health hasta que el BUILD_ID cambie respecto
      # del que servía antes del deploy. Si Dokploy no llega a servir un build
      # nuevo dentro del timeout, FALLA (antes era un `sleep 600` ciego que daba
      # falso-verde aunque Dokploy sirviera el build viejo). cache-bust en la URL
      # para no leer una respuesta cacheada por Cloudflare.
      - name: Wait for Dokploy to serve the new build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          prev="${{ steps.prev_version.outputs.version }}"
          echo "Previous version: $prev"
          deadline=$(( SECONDS + 900 )) # 15 min
          while [ "$SECONDS" -lt "$deadline" ]; do
            cur=$(curl -sf "https://garca.app/api/health?cb=$(date +%s)" | jq -r '.version // "error"' 2>/dev/null || echo "error")
            if [ "$cur" != "error" ] && [ "$cur" != "none" ] && [ "$cur" != "unknown" ] && [ "$cur" != "$prev" ]; then
              echo "✓ New build is serving: $cur"
              exit 0
            fi
            echo "still serving '$cur' (prev '$prev'), waiting..."
            sleep 20
          done
          echo "::error::Dokploy did not serve a new build within 15 min (still '$prev'). Revisar el checkout/caché de build en Dokploy."
          exit 1

      - name: Purge Cloudflare cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ] || [ -z "$CF_API_TOKEN" ]; then
            echo "Cloudflare secrets not set yet, skipping purge."
            exit 0
          fi
          response=$(curl -s -o /tmp/cf-response.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          if [ "$response" != "200" ]; then
            echo "Cloudflare purge failed with status $response:"
            cat /tmp/cf-response.json
            exit 1
          fi
          echo "Cloudflare cache purged successfully."

      - name: Ping IndexNow (Bing / Yandex / Seznam / Naver)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: npm run ping-indexnow
