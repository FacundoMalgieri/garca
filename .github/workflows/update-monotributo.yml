name: Update Monotributo Data

on:
  # Run twice a year: January 20 and July 20 at 10:00 UTC
  # (After recategorization periods which are typically Jan 1-20 and Jul 1-20)
  schedule:
    - cron: "0 10 20 1 *" # January 20
    - cron: "0 10 20 7 *" # July 20
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-monotributo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run update script
        run: npm run update-monotributo

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/monotributo-categorias.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in monotributo data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in monotributo data"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/monotributo-categorias.ts
          git commit -m "chore: update monotributo categories data"
          git push

      - name: Trigger deploy workflow
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })

      # Si el scraper falla (ej. ARCA cambió el HTML), abrir un issue para
      # enterarse a tiempo. En enero 2026 la corrida programada falló en
      # silencio y solo se salvó re-ejecutándola a mano.
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Update Monotributo Data falló (run ${context.runId})`,
              body: [
                'La actualización automática de categorías de Monotributo **falló**.',
                '',
                `- Run: ${runUrl}`,
                '',
                'Posibles causas: ARCA cambió el HTML de la tabla, timeout de Playwright, o el sitio caído.',
                'Revisar `scripts/update-monotributo.ts` y re-ejecutar el workflow con `workflow_dispatch` una vez corregido.',
              ].join('\n'),
            })
